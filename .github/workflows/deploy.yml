name: Deploy MES App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: docker build -t trainwithjitin/smart-mes .

    - name: Push Docker Image
      run: docker push trainwithjitin/smart-mes

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker stop mes-app || true
          docker rm mes-app || true
          docker pull trainwithjitin/smart-mes
          docker run -d -p 5000:5000 --name mes-app trainwithjitin/smart-mes
